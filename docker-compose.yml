version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: hn_identity
    volumes:
      - hn_db:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  app:
    build: .
    restart: unless-stopped
    depends_on: [db]
    environment:
      HN_DB_URL: postgres://hn:${POSTGRES_PASSWORD:-changeme}@db:5432/hn_identity
      HN_DB_DIRECT_URL: postgres://hn:${POSTGRES_PASSWORD:-changeme}@db:5432/hn_identity
      HN_JWT_SECRET: ${HN_JWT_SECRET:-change-this-to-32-random-bytes}
      HN_MAIL_FROM: ${HN_MAIL_FROM:-HN Identity <noreply@example.com>}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  hn_db:
